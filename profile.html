<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Profile · Taiwan Rice Roll 台湾紫米饭团</title>
  <meta name="theme-color" content="#6d28d9" />
  <link rel="icon" href="assets/icons/favicon-v2.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- shared site header is injected by js/chrome.js -->

  <section class="hero">
    <div class="max-w-3xl mx-auto px-4 py-10 md:py-14 text-center">
      <div class="w-14 h-14 mx-auto rounded-2xl bg-white/15 flex items-center justify-center text-white mb-4"><span class="icon icon-xl" data-icon="user"></span></div>
      <h1 class="text-3xl md:text-4xl font-extrabold" data-i18n="prof.title">My Profile</h1>
      <p class="mt-1 text-white/60 text-sm" data-shop-name>Taiwan Rice Roll 台湾紫米饭团</p>
    </div>
  </section>

  <!-- sign-in gate -->
  <div id="gate" class="hidden max-w-3xl mx-auto px-4 py-16 text-center">
    <p class="text-gray-500 mb-4" data-i18n="prof.signin">Please sign in to view your profile.</p>
    <a href="index.html" class="btn btn-primary" data-i18n="guide.back">Back to store</a>
  </div>

  <main id="content" class="hidden max-w-3xl mx-auto px-4 py-10 space-y-5">
    <!-- Loyalty -->
    <div id="loyalty" class="brand-gradient text-white rounded-2xl p-5"></div>
    <p class="text-xs text-gray-400 -mt-2" data-i18n="acct.earn">Earn 1 point per RM 1 spent when an order is completed.</p>

    <!-- Details -->
    <section class="card p-6">
      <h2 class="text-lg font-extrabold text-gray-800 mb-4" data-i18n="prof.details">My details</h2>
      <form id="details-form" class="space-y-3">
        <div class="grid md:grid-cols-2 gap-3">
          <div><label class="text-xs font-semibold text-gray-500" data-i18n="prof.name">Name</label>
            <input name="full_name" class="field mt-1" /></div>
          <div><label class="text-xs font-semibold text-gray-500" data-i18n="prof.phone">Phone</label>
            <input name="phone" class="field mt-1" /></div>
        </div>
        <div class="grid md:grid-cols-2 gap-3 text-sm">
          <div><p class="text-xs font-semibold text-gray-500" data-i18n="prof.email">Email</p><p id="email" class="mt-1 text-gray-700">—</p></div>
          <div><p class="text-xs font-semibold text-gray-500" data-i18n="prof.since">Member since</p><p id="since" class="mt-1 text-gray-700">—</p></div>
        </div>
        <button type="submit" class="btn btn-primary py-2.5 px-5" data-i18n="prof.save">Save changes</button>
      </form>
    </section>

    <!-- History -->
    <section class="card p-6">
      <h2 class="text-lg font-extrabold text-gray-800 mb-4" data-i18n="prof.history">Order history</h2>
      <div id="history"><p class="text-center text-gray-400 py-6" data-i18n="acct.loading">Loading…</p></div>
    </section>
  </main>

  <footer class="brand-gradient text-white/90 text-center py-6 text-sm">
    <p class="font-bold" data-shop-name>Taiwan Rice Roll 台湾紫米饭团</p>
    <p class="text-white/70 mt-1">Jalan Luak, Miri</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/chrome.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pwa.js"></script>
  <script src="js/profile.js"></script>
  <script>
    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').then((reg) => { reg.addEventListener('updatefound', () => { const nw = reg.installing; nw && nw.addEventListener('statechange', () => { if (nw.state === 'installed' && navigator.serviceWorker.controller) location.reload(); }); }); }).catch(() => {}));
  </script>
</body>
</html>
